---
- name: Install git
  dnf:
    name: git
    state: present
    update_cache: yes

- name: Add NodeSource repo (RedHat/Rocky)
  shell: curl -fsSL https://rpm.nodesource.com/setup_{{ node_version }}.x | bash -
  args:
    creates: /etc/yum.repos.d/nodesource-nodejs.repo

- name: Install nodejs
  dnf:
    name: nodejs
    state: present
